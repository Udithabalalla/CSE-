services:
  mongodb:
    image: mongo:7
    container_name: cse_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cse_analyzer

  redis:
    image: redis:7-alpine
    container_name: cse_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
